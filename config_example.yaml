benchmark_ticker: "1306.T"  # TOPIX連動ETF（例）
years: 5                     # 過去データの取得年数
output_dir: "output"         # JSON出力先ディレクトリ

# LLM関連設定（基本は使わない。コメント要約・損切り目安はLLMなしでもATRで算出可能）
llm:
  enabled: false             # true にすると LLM で catalyst_summary / stop_loss を生成（APIキー要）
  provider: "openai"
  model: "gpt-4.1-mini"

# キャッシュ更新のスケジュール（曜日・時刻を考慮）
# 指定しない場合はデフォルトで 6:00 JST 以降を境に「今日」のキャッシュを要求（VIX 確定後）
# cache:
#   cache_path: "data/daily_cache.json"
#   cutoff_hour: 6
#   cutoff_minute: 0
#   market_tz: "Asia/Tokyo"

# DPA（ポートフォリオ最適化）関連
# 総資産は portfolio_state.json の現金残高＋株式評価額で自動計算（設定不要）
dpa:
  # パス（省略時はデフォルトを使用）
  # sector_peers_path: "data/sector_peers.json"
  # portfolio_path: "portfolio_state.json"
  # scores_history_path: "data/scores_history.json"
  vi_ticker: "^VIX"            # 米国VIX（yfinance で取得）。未指定時は MACD のみで判定
  mu_cash: 0.4                 # 現金比率のベースライン
  a_vi: 0.2                    # VI Zスコアに対する感度（vi_ticker 未指定時は VI 項は 0 扱い）
  b_macd: 0.2                  # MACDトレンドに対する感度
  # 売却（パージ）・ポジション上限
  over_weight_threshold: 0.02   # 許容乖離（比率）。UI では %（例: 2.0 → 0.02）
  max_position_pct: 0.15        # 1銘柄の最大保有比率（比率）。UI では %（例: 15.0 → 0.15）
  max_position_jpy: 750000      # 1銘柄の絶対上限額（円）
  # 購入（ドラフト）
  ignition_momentum_threshold: 50.0   # 着火点モメンタム（未保有の momentum_score がこの値以上で候補）
  max_draft_candidates: 5         # 動的Nシミュレーションの最大N（整数）
  # マクロ・現金比率の微調整（任意）
  # macd_scale: 0.002          # MACD トレンド正規化のスケール
  # min_cash_ratio: 0.2        # 目標現金比率の下限
  # max_cash_ratio: 0.8        # 目標現金比率の上限
  # momentum_threshold: 50.0   # 後方互換: ignition_momentum_threshold が無いときの着火点
  # lot_size: 100              # 売買単位（日本株: 100株単位）

# ウォッチリスト
watchlist:
  max_items: 30               # 登録上限数。超過時はスコア最下位の WATCHING を自動削除

# 毎朝メール送信（cron で send_daily_report.py 実行時）
daily_report:
  enabled: true               # false にするとバッチは実行するがメールは送らない

