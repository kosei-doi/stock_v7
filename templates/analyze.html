{% extends "base.html" %}
{% block title %}企業分析 - DPA{% endblock %}
{% block content %}
<div class="space-y-6">
  <h2 class="text-2xl font-bold text-slate-100">企業分析＆自動追加</h2>
  <div class="bg-slate-800 rounded-xl border border-slate-700 p-6 max-w-lg">
    <label class="block text-slate-400 text-sm mb-2">コード（例: 7203 日本株 / AAPL 米国株）</label>
    <div class="flex gap-2">
      <input
        type="text"
        id="ticker-input"
        placeholder="7203 または AAPL"
        class="flex-1 px-4 py-2 rounded-lg bg-slate-700 border border-slate-600 text-slate-100 placeholder-slate-500 focus:ring-2 focus:ring-amber-500 focus:border-transparent"
      />
      <button type="button" id="btn-analyze" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-slate-900 font-semibold rounded-lg transition">分析実行</button>
    </div>
    <p id="analyze-msg" class="mt-3 text-sm text-slate-400"></p>
    <div id="analyze-loading" class="mt-4 hidden items-center gap-2">
      <i class="fas fa-spinner fa-spin text-amber-400"></i>
      <span class="text-slate-400">分析中…</span>
    </div>
    <div id="analyze-result" class="mt-4 hidden space-y-4">
      <p class="text-green-500 font-medium" id="result-message"></p>
      <div class="grid grid-cols-2 gap-2 text-sm">
        <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">Value:</span> <span id="result-value" class="text-slate-200"></span></div>
        <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">Safety:</span> <span id="result-safety" class="text-slate-200"></span></div>
        <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">Momentum:</span> <span id="result-momentum" class="text-slate-200"></span></div>
        <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">Total:</span> <span id="result-total" class="text-amber-400 font-semibold"></span></div>
      </div>
      <div id="result-detail" class="space-y-3 text-sm hidden">
        <div class="text-slate-400 font-medium">詳細</div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">企業名:</span> <span id="result-name" class="text-slate-200 truncate"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">セクター:</span> <span id="result-sector" class="text-slate-200 truncate"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">終値:</span> <span id="result-last-close" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">P/B:</span> <span id="result-pb" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">P/E:</span> <span id="result-pe" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">β:</span> <span id="result-beta" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">R²:</span> <span id="result-r2" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">ATR%:</span> <span id="result-atr" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">ピア数:</span> <span id="result-peer-count" class="text-slate-200"></span></div>
        </div>
        <div class="text-slate-400 font-medium">取得データの特徴</div>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">データ期間:</span> <span id="result-date-range" class="text-slate-200 text-xs"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">トレード日数:</span> <span id="result-rows" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">ベンチマーク:</span> <span id="result-benchmark" class="text-slate-200 truncate"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">時系列Z(PB):</span> <span id="result-time-z-pb" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">時系列Z(PE):</span> <span id="result-time-z-pe" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">ピアZ(PB):</span> <span id="result-space-z-pb" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">ピアZ(PE):</span> <span id="result-space-z-pe" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">目標P/B:</span> <span id="result-target-pb" class="text-slate-200"></span></div>
          <div class="bg-slate-700/50 rounded p-2"><span class="text-slate-500">目標P/E:</span> <span id="result-target-pe" class="text-slate-200"></span></div>
        </div>
        <div class="flex flex-wrap gap-3 text-slate-400">
          <span id="result-rank-badge"></span>
          <span id="result-stop-loss"></span>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  const input = document.getElementById('ticker-input');
  const btn = document.getElementById('btn-analyze');
  const msg = document.getElementById('analyze-msg');
  const loading = document.getElementById('analyze-loading');
  const result = document.getElementById('analyze-result');
  const resultMessage = document.getElementById('result-message');
  const resultValue = document.getElementById('result-value');
  const resultSafety = document.getElementById('result-safety');
  const resultMomentum = document.getElementById('result-momentum');
  const resultTotal = document.getElementById('result-total');

  function normalizeTicker(str) {
    // 全角英数字を半角に変換
    const toHalf = str.replace(/[０-９Ａ-Ｚａ-ｚ]/g, function(c) {
      const code = c.charCodeAt(0);
      if (code >= 0xFF10 && code <= 0xFF19) return String.fromCharCode(code - 0xFEE0);
      if (code >= 0xFF21 && code <= 0xFF3A) return String.fromCharCode(code - 0xFEE0);
      if (code >= 0xFF41 && code <= 0xFF5A) return String.fromCharCode(code - 0xFEE0);
      return c;
    });
    return toHalf.replace(/[^A-Za-z0-9.]/g, '').toUpperCase();
  }

  btn.addEventListener('click', function() {
    const raw = (input.value || '').trim();
    const ticker = normalizeTicker(raw);
    if (!ticker || ticker.length < 2 || ticker.length > 20) {
      msg.textContent = 'コードは 2〜20 文字の英数字で入力してください（例: 7203, AAPL）。';
      msg.className = 'mt-3 text-sm text-amber-400';
      return;
    }
    msg.textContent = '';
    result.classList.add('hidden');
    loading.classList.remove('hidden');
    loading.classList.add('flex');
    btn.disabled = true;
    fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker: ticker })
    }).then(r => {
      if (!r.ok) return r.json().then(d => { throw new Error(d.detail || r.statusText); });
      return r.json();
    }).then(data => {
      loading.classList.add('hidden');
      result.classList.remove('hidden');
      resultMessage.textContent = data.message || 'ウォッチリストに自動追加されました。';
      resultValue.textContent = data.value_score != null ? data.value_score.toFixed(1) : '-';
      resultSafety.textContent = data.safety_score != null ? data.safety_score.toFixed(1) : '-';
      resultMomentum.textContent = data.momentum_score != null ? data.momentum_score.toFixed(1) : '-';
      resultTotal.textContent = data.total_score != null ? data.total_score.toFixed(1) : '-';

      const detail = document.getElementById('result-detail');
      const fmt = (v, d = 2) => (v != null && v !== '' && !isNaN(v)) ? (typeof v === 'number' && v % 1 !== 0 ? v.toFixed(d) : v) : '-';
      document.getElementById('result-name').textContent = data.name || data.ticker || '-';
      document.getElementById('result-sector').textContent = data.sector || '-';
      document.getElementById('result-last-close').textContent = data.last_close != null && data.last_close !== '' ? Number(data.last_close).toLocaleString() + ' 円' : '-';
      document.getElementById('result-pb').textContent = fmt(data.pb);
      document.getElementById('result-pe').textContent = fmt(data.pe);
      document.getElementById('result-beta').textContent = fmt(data.beta);
      document.getElementById('result-r2').textContent = data.r_squared != null && data.r_squared !== '' ? (Number(data.r_squared) * 100).toFixed(1) + '%' : '-';
      document.getElementById('result-atr').textContent = data.atr_percent != null && data.atr_percent !== '' ? Number(data.atr_percent).toFixed(2) + '%' : '-';
      document.getElementById('result-peer-count').textContent = data.peer_count != null && data.peer_count !== '' ? data.peer_count : '-';

      const dmin = data.date_min, dmax = data.date_max;
      const dateRange = (dmin && dmax) ? (dmin.replace(/ 00:00:00/, '') + ' 〜 ' + dmax.replace(/ 00:00:00/, '')) : '-';
      document.getElementById('result-date-range').textContent = dateRange;
      document.getElementById('result-rows').textContent = data.rows != null && data.rows !== '' ? data.rows + ' 日' : '-';
      document.getElementById('result-benchmark').textContent = data.benchmark || '-';
      document.getElementById('result-time-z-pb').textContent = fmt(data.time_z_pb);
      document.getElementById('result-time-z-pe').textContent = fmt(data.time_z_pe);
      document.getElementById('result-space-z-pb').textContent = fmt(data.space_z_pb);
      document.getElementById('result-space-z-pe').textContent = fmt(data.space_z_pe);
      document.getElementById('result-target-pb').textContent = fmt(data.target_pb);
      document.getElementById('result-target-pe').textContent = fmt(data.target_pe);

      const rankBadge = document.getElementById('result-rank-badge');
      if (data.watchlist_rank != null && data.watchlist_total != null && data.watchlist_total > 0) {
        rankBadge.textContent = 'ウォッチリスト順位: ' + data.watchlist_rank + ' / ' + data.watchlist_total;
        rankBadge.className = 'text-amber-400 font-medium';
      } else {
        rankBadge.textContent = '';
      }

      const stopLoss = document.getElementById('result-stop-loss');
      if (data.stop_loss_recommendation != null && !isNaN(data.stop_loss_recommendation)) {
        stopLoss.textContent = '推奨損切り: ' + Number(data.stop_loss_recommendation).toLocaleString() + ' 円';
      } else {
        stopLoss.textContent = '';
      }

      detail.classList.remove('hidden');
      msg.textContent = '';
    }).catch(e => {
      loading.classList.add('hidden');
      msg.textContent = 'エラー: ' + (e.message || '分析に失敗しました');
      msg.className = 'mt-3 text-sm text-red-400';
    }).finally(() => { btn.disabled = false; });
  });
})();
</script>
{% endblock %}
